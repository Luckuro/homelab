services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
      - VERSION=docker
      - PLEX_CLAIM=claim-6rm8w2VFpJttPQzJVuL2  # reemplaza con tu token
    volumes:
    - /opt/docker/plex/config:/config
    - /media/plex/peliculas:/media/peliculas
    - /media/plex/series:/media/series
    - /media/plex/musica:/media/musica
    devices:
      - /dev/dri:/dev/dri  # Intel QuickSync para transcoding
    restart: unless-stopped
