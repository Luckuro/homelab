apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.traefik.io/traefik
    chart: traefik
    targetRevision: "34.x"
    helm:
      valueFiles:
        - $values/kubernetes/apps/traefik/values.yaml
  sources:
    - repoURL: https://helm.traefik.io/traefik
      chart: traefik
      targetRevision: "34.x"
    - repoURL: git@github.com:Luckuro/homelab.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true